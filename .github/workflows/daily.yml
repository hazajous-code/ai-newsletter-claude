name: Daily scrape & deploy

on:
  schedule:
    # 매일 22:00 UTC = 07:00 KST (GitHub 부하에 따라 수 분 지연될 수 있음)
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write   # 갱신된 data/ 커밋
  pages: write      # Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape (LLM 요약은 ANTHROPIC_API_KEY/OPENAI_API_KEY 시크릿 있을 때만)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
        run: python scrape_daily.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: 자동 갱신 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
