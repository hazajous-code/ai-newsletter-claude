name: Daily scrape & deploy

on:
  schedule:
    # 매일 22:00 UTC = 07:00 KST (GitHub 부하에 따라 수 분 지연될 수 있음)
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write   # 갱신된 data/ 커밋
  pages: write      # Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape (LLM 요약은 자격증명 시크릿 있을 때만; 없으면 fallback)
        env:
          # Claude Platform on AWS (SigV4) — IAM 자격증명
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}   # 임시(STS) 자격증명일 때만 필요
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ANTHROPIC_AWS_WORKSPACE_ID: ${{ secrets.ANTHROPIC_AWS_WORKSPACE_ID }}
          # 직접 키 (first-party sk-ant-... / OpenAI). AWS 미설정 시 자동으로 이게 사용됨.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # 비우면 사용 가능한 공급자를 aws→anthropic→openai 순으로 자동 선택.
          # 특정 공급자 강제 시 repo Variable 에 LLM_PROVIDER 지정(aws|anthropic|openai).
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
        run: python scrape_daily.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: 자동 갱신 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
